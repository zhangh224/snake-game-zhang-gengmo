<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>贪吃蛇-张耕陌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-DoAUAcg5.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BnrYTY48.css">
  </head>
  <body class="bg-[#0a0a0f] overflow-hidden touch-none">
    <div id="auth-screen" style="position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:monospace;">
      <div style="background:rgba(20,20,30,0.9);border:2px solid #00ff9d;border-radius:12px;padding:32px 24px;max-width:360px;width:90%;text-align:center;box-shadow:0 0 40px rgba(0,255,157,0.3);">
        <div style="font-size:48px;margin-bottom:16px;">🐍</div>
        <h1 style="color:#00ff9d;font-size:20px;margin:0 0 8px 0;text-shadow:0 0 10px #00ff9d;">贪吃蛇-张耕陌</h1>
        <p style="color:#888;font-size:12px;margin:0 0 24px 0;">请输入访问密码</p>
        <input id="pwd-input" type="password" inputmode="numeric" placeholder="输入密码" style="width:100%;padding:14px;background:#0a0a0f;border:2px solid #00ff9d;border-radius:8px;color:#00ff9d;font-size:18px;text-align:center;letter-spacing:4px;outline:none;box-sizing:border-box;font-family:monospace;" />
        <div id="pwd-error" style="color:#ff4d6d;font-size:12px;margin-top:12px;min-height:18px;"></div>
        <button id="pwd-btn" style="width:100%;margin-top:16px;padding:14px;background:#00ff9d;border:none;border-radius:8px;color:#0a0a0f;font-size:16px;font-weight:bold;cursor:pointer;font-family:monospace;letter-spacing:2px;">进入游戏</button>
      </div>
    </div>
    <div id="root" style="display:none;"></div>
    <script>
      (function() {
        const PASSWORD = '6232011';
        const STORAGE_KEY = 'snake_game_auth';
        if (localStorage.getItem(STORAGE_KEY) === '1') {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('root').style.display = 'block';
          return;
        }
        const input = document.getElementById('pwd-input');
        const btn = document.getElementById('pwd-btn');
        const err = document.getElementById('pwd-error');
        function check() {
          const val = input.value;
          if (val === PASSWORD) {
            localStorage.setItem(STORAGE_KEY, '1');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('root').style.display = 'block';
          } else {
            err.textContent = '❌ 密码错误，请重试';
            input.value = '';
            input.focus();
          }
        }
        btn.addEventListener('click', check);
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') check();
        });
        setTimeout(function() { input.focus(); }, 100);
      })();
    </script>
  </body>
</html>
